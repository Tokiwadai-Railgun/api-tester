name: Sync + Build + Release

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync-build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/Tokiwadai-Railgun/api-tester.git
          git fetch upstream

      - name: Merge upstream et détecter les changements
        id: changes
        run: |
          $before = git rev-parse HEAD
          git checkout main
          git merge upstream/main --no-edit
          $after = git rev-parse HEAD
          if ($before -ne $after) {
            echo "changed=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "changed=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Push updates
        if: steps.changes.outputs.changed == 'true'
        run: git push origin main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows binary  # ← tourne toujours
        run: cargo build --release

      - name: Create Release  # ← seulement si upstream a changé
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Automated build ${{ github.run_number }}"
          files: target/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}